name: Project Metrics Logger

on:
  schedule:
    # Runs everyday at 23:55 UTC to catch the day's total metrics
    - cron: "55 23 * * *" 
  workflow_dispatch: # Allows manual trigger

jobs:
  traffic:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the dedicated traffic branch
      - name: Checkout Traffic Branch
        uses: actions/checkout@v4
        with:
          ref: "traffic"

      # 2. Run the metrics scraper action (Requires repo token)
      - name: Fetch Repository Traffic
        uses: sangonzal/repository-traffic-action@v.0.1.6
        env:
          TRAFFIC_ACTION_TOKEN: ${{ secrets.METRICS_TOKEN }}

      # 3. Automatically commit the new CSV data back to the traffic branch
      - name: Commit Changes to Traffic Branch
        uses: EndBug/add-and-commit@v9
        with:
          author_name: "GitHub Actions Bot"
          author_email: "actions@github.com"
          message: "Accounted daily traffic logs"
          add: "traffic" # Commits the folder where the data is saved
